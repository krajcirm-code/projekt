<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Snake.io Clone</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        h2 { margin: 0 0 5px 0; font-size: 24px; color: #2ecc71; }
        p { margin: 0; font-size: 14px; color: #bbb; }
        canvas {
            background-color: #111;
            border: 3px solid #333;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
    </style>
</head>
<body>

<div id="ui">
    <h2>Skóre: <span id="score">0</span></h2>
    <p>Had nasleduje tvoj kurzor myši</p>
</div>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const socket = io();
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    let mouseX = 400;
    let mouseY = 300;
    let mySnakeHead = null;

    // Zachytávanie myši na plátne
    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;
    });

    // Výpočet smeru OD HLAVY HADA ku kurzoru
    setInterval(() => {
        if (socket.id && mySnakeHead) {
            const dx = mouseX - mySnakeHead.x;
            const dy = mouseY - mySnakeHead.y;
            
            // Ak je myš ďalej ako 10 pixelov od hlavy, otoč hada
            if (Math.hypot(dx, dy) > 10) {
                const angle = Math.atan2(dy, dx);
                socket.emit('update_input', { angle: angle });
            }
        }
    }, 30);

    // Vykresľovanie hry
    socket.on('game_tick', (gameState) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Uloženie pozície hlavy tvojho hada
        if (gameState.players[socket.id]) {
            mySnakeHead = gameState.players[socket.id].body[0];
            scoreEl.innerText = gameState.players[socket.id].score;
        }

        // Vykreslenie jedla
        gameState.foods.forEach(food => {
            ctx.beginPath();
            ctx.arc(food.x, food.y, 6, 0, Math.PI * 2);
            ctx.fillStyle = food.color;
            ctx.fill();
            ctx.closePath();
        });

        // Vykreslenie všetkých hadov
        Object.keys(gameState.players).forEach(pId => {
            const player = gameState.players[pId];
            
            player.body.forEach((part, index) => {
                ctx.beginPath();
                const isHead = index === 0;
                const radius = isHead ? 12 : 9;
                
                ctx.arc(part.x, part.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = player.color;
                ctx.fill();
                
                ctx.strokeStyle = '#111';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.closePath();

                if (isHead) {
                    ctx.beginPath();
                    ctx.arc(part.x - 3, part.y - 3, 3, 0, Math.PI * 2);
                    ctx.arc(part.x + 3, part.y - 3, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.closePath();
                }
            });
        });
    });
</script>
</body>
</html>
